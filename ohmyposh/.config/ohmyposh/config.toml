console_title_template = '{{ .Shell }} in {{ .Folder }}'
version = 4
final_space = true

[palette]
  black = '#232634'
  blue = '#8CAAEE'
  green = '#A6D189'
  lavender = '#BABBF1'
  mauve = '#CA9EE6'
  pink = '#F4B8E4'
  rosewater = '#F2D5CF'
  sapphire = '#85C1DC'
  sky = '#99D1DB'
  subtext1 = '#B5BCE0'
  surface0 = '#414559'
  text = '#FFFFFF'
  yellow = '#F9E2AF'

[secondary_prompt]
  template = '<p:mauve,transparent></><,p:mauve> > </><p:mauve,transparent></> '
  foreground = 'p:text'
  background = 'transparent'

[transient_prompt]
  template = '<p:mauve,transparent></><,p:mauve> {{ .Folder }} </><p:mauve,transparent></> '
  foreground = 'p:text'
  background = 'transparent'

[upgrade]
  source = 'cdn'
  interval = '168h'
  auto = false
  notice = false

[[blocks]]
  type = 'prompt'
  alignment = 'left'

  [[blocks.segments]]
    leading_diamond = ''
    trailing_diamond = ''
    template = ' {{ if .SSHSession }} {{ end }}{{ .UserName }} '
    foreground = 'p:text'
    background = 'p:mauve'
    type = 'session'
    style = 'diamond'

  [[blocks.segments]]
    template = '  {{ path .Path .Location }} '
    foreground = 'p:text'
    powerline_symbol = ''
    background = 'p:sapphire'
    type = 'path'
    style = 'powerline'

    [blocks.segments.options]
      style = 'folder'

  [[blocks.segments]]
    template = ' {{ .HEAD }}{{ if or (.Working.Changed) (.Staging.Changed) }}*{{ end }}'
    foreground = 'p:text'
    powerline_symbol = ''
    background = 'p:mauve'
    type = 'git'
    style = 'powerline'
    # background_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:yellow{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:red{{ end }}', '{{ if gt .Ahead 0 }}#49416D{{ end }}', '{{ if gt .Behind 0 }}#7A306C{{ end }}']
    # foreground_templates = ['{{ if or (.Working.Changed) (.Staging.Changed) }}p:black{{ end }}', '{{ if and (gt .Ahead 0) (gt .Behind 0) }}p:white{{ end }}', '{{ if gt .Ahead 0 }}p:white{{ end }}']

    [blocks.segments.options]
      branch_template = '{{ trunc 25 .Branch }}'
      fetch_status = true
      fetch_upstream_icon = false
      branch_icon = ""

[[blocks]]
  type = 'rprompt'

  [[blocks.segments]]
    type = 'executiontime'
    template = '{{ .FormattedMs }}'
    foreground = 'p:white'
    background = 'transparent'
    style = 'plain'

  [[blocks.segments]]
    template = ' at <p:lavender><b>{{ .CurrentDate | date "15:04:05" }}</b></>'
    foreground = 'p:text'
    background = 'transparent'
    type = 'time'
    style = 'plain'

[[tooltips]]
  leading_diamond = ''
  trailing_diamond = ''
  template = '  {{ .Profile }}{{ if .Region }}@{{ .Region }}{{ end }} '
  foreground = 'p:text'
  background = 'p:sapphire'
  type = 'aws'
  style = 'diamond'
  tips = ['aws']

  [tooltips.options]
    display_default = true
